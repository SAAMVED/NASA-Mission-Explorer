<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NASA Mission Explorer</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- this overlay covers the whole screen while data is loading
         i'm hiding/showing it from app.js using display flex/none -->
    <div id="loadingOverlay">
      <div class="spinner"></div> <!-- the spinning circle animation is done in css -->
      <p>Contacting NASA...</p>
    </div>

    <header>
      <h1>NASA Mission Explorer</h1>
      <p>Astronomy Picture of the Day</p>

      <!-- the date picker and button - user picks a date and clicks Explore
           i'm reading the value of datePicker from app.js when the button is clicked -->
      <div class="controls">
        <label for="datePicker">Pick a Date</label>
        <input type="date" id="datePicker" />
        <button id="fetchBtn">Explore</button>
      </div>
    </header>

    <main>

      <!-- this box is hidden by default (in css), only shows up if the API call fails
           i'm toggling it in app.js using display block/none -->
      <div id="errorBox">
        <p id="errorMessage">Something went wrong.</p>
      </div>

      <!-- main card that holds everything - the image, buttons, and text info -->
      <div id="apodCard">

        <!-- i'm injecting the img or iframe tag here from app.js
             keeping it empty in HTML so JS can put whatever media type NASA sends -->
        <div id="mediaWrapper"></div>

        <!-- these two buttons let the user view the image in fullscreen or switch to HD
             the click listeners for these are in app.js -->
        <div id="mediaActions">
          <button id="fullscreenBtn">Fullscreen</button>
          <button id="hdToggleBtn">HD</button>
        </div>

        <!-- all the text info about the photo goes here
             app.js fills in these fields once the API responds -->
        <div class="apod-info">
          <span id="apodDate"></span>         <!-- date the photo was taken/posted -->
          <span id="apodCopyright"></span>    <!-- photographer credit or "Public Domain" -->
          <h2 id="apodTitle">Loading...</h2> <!-- title shows "Loading..." until data arrives -->
          <p id="apodExplanation"></p>        <!-- NASA's description of the photo -->
        </div>

      </div>
    </main>

    <footer>
      <p>Data from <a href="https://api.nasa.gov/" target="_blank">NASA Open APIs</a></p>
    </footer>
    <script src="app.js"></script>
  </body>
</html>
