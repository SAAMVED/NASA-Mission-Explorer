<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NASA Mission Explorer</title>
    <link rel="icon" type="image/png" href="https://www.nasa.gov/wp-content/themes/nasa/assets/images/nasa-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- this overlay covers the whole screen while data is loading
         i'm hiding/showing it from app.js using display flex/none -->
    <div id="loadingOverlay">
      <div class="spinner"></div>
      <p>Contacting NASA...</p>
    </div>

    <header>
      <div class="hero">
        <img src="https://www.nasa.gov/wp-content/themes/nasa/assets/images/nasa-logo.svg" alt="NASA Logo" class="nasa-logo" />
        <div class="hero-text">
          <h1>NASA Mission Explorer</h1>
          <p class="subtitle">Astronomy Picture of the Day</p>
        </div>
      </div>
      <!-- the date picker and button - user picks a date and clicks Explore -->
      <div class="controls">
        <label for="datePicker">Pick a Date</label>
        <input type="date" id="datePicker" />
        <button id="fetchBtn">Explore</button>
      </div>
    </header>

    <main>

      <!-- this box is hidden by default, only shows if API call fails -->
      <div id="errorBox">
        <p id="errorMessage">Something went wrong.</p>
      </div>

      <!-- controls bar: search, filter, sort, dark mode -->
      <div id="controlsBar">
        <input type="text" id="searchInput" placeholder="Search by title..." />

        <select id="filterSelect">
          <option value="all">All Media</option>
          <option value="image">Images Only</option>
          <option value="video">Videos Only</option>
        </select>

        <select id="sortSelect">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
        </select>

        <button id="darkModeBtn">Light Mode</button>
      </div>

      <!-- main cinematic card — shows the selected photo -->
      <div id="apodCard">

        <!-- JS injects img or iframe here depending on media_type -->
        <div id="mediaWrapper"></div>

        <!-- dark gradient overlay on top of image -->
        <div id="overlay"></div>

        <!-- HD and Fullscreen buttons top right -->
        <div id="mediaActions">
          <button id="fullscreenBtn">Fullscreen</button>
          <button id="hdToggleBtn">HD</button>
        </div>

        <!-- text info pinned to bottom of card -->
        <div class="apod-info">
          <span id="apodDate"></span>
          <span id="apodCopyright"></span>
          <h2 id="apodTitle">Loading...</h2>
          <p id="apodExplanation"></p>
        </div>

      </div>

      <!-- gallery grid — JS fills this with 30 cards -->
      <div id="galleryGrid"></div>

    </main>

    <footer>
      <p>Data from <a href="https://api.nasa.gov/" target="_blank">NASA Open APIs</a></p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
